<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 AI News Intelligence Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen font-sans antialiased selection:bg-indigo-500/30 selection:text-indigo-200">

    <div x-data="{
        region: 'India',
        category: 'All',
        articles: [],
        selectedArticle: null,
        aiExplanation: '',
        aiDeepContext: '',
        loadingFeed: false,
        loadingAnalysis: false,
        categories: ['All', 'Politics', 'Technology', 'Finance', 'Sports', 'Entertainment'],

        async fetchNews() {
            this.loadingFeed = true;
            this.articles = [];
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/news?region=${this.region}&category=${this.category}`);
                const data = await response.json();
                if (data.status === 'success') {
                    this.articles = data.articles;
                }
            } catch (error) {
                console.error('Failed to load news stream:', error);
            } finally {
                this.loadingFeed = false;
            }
        },

        async analyzeArticle(article) {
            this.selectedArticle = article;
            this.loadingAnalysis = true;
            this.aiExplanation = '';
            this.aiDeepContext = '';
            try {
                const response = await fetch('http://127.0.0.1:8000/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: article.title, link: article.link })
                });
                const data = await response.json();
                if (data.status === 'success' || data.status === 'partial_success') {
                    this.aiExplanation = data.analysis.explanation;
                    this.aiDeepContext = data.analysis.deep_context;
                }
            } catch (error) {
                this.aiExplanation = 'Failed to compile AI insights.';
                this.aiDeepContext = 'An issue occurred while communicating with the NLP processing layer.';
            } finally {
                this.loadingAnalysis = false;
            }
        }
    }" x-init="fetchNews()" class="flex flex-col h-screen overflow-hidden">

        <header class="border-b border-zinc-800 bg-zinc-900/50 backdrop-blur px-6 py-4 flex items-center justify-between shrink-0">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🧠</span>
                <h1 class="text-lg font-bold tracking-tight text-white bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                    AI News Intelligence System
                </h1>
            </div>
            
            <div class="flex bg-zinc-950 p-1 rounded-lg border border-zinc-800/80">
                <button @click="region = 'India'; fetchNews()" :class="region === 'India' ? 'bg-indigo-600 text-white' : 'text-zinc-400 hover:text-zinc-200'" class="px-4 py-1.5 rounded-md text-xs font-medium transition-all duration-200">
                    India Stream
                </button>
                <button @click="region = 'World'; fetchNews()" :class="region === 'World' ? 'bg-indigo-600 text-white' : 'text-zinc-400 hover:text-zinc-200'" class="px-4 py-1.5 rounded-md text-xs font-medium transition-all duration-200">
                    World Stream
                </button>
            </div>
        </header>

        <main class="flex flex-1 overflow-hidden">

            <section class="w-3/5 flex flex-col border-r border-zinc-800 bg-zinc-950/20">
                
                <div class="px-6 py-3 border-b border-zinc-800/60 bg-zinc-900/20 flex items-center space-x-2 overflow-x-auto no-scrollbar shrink-0">
                    <template x-for="cat in categories" :key="cat">
                        <button @click="category = cat; fetchNews()" 
                                :class="category === cat ? 'bg-zinc-800 text-indigo-400 border-zinc-700 font-semibold' : 'text-zinc-400 border-transparent hover:bg-zinc-900/60 hover:text-zinc-200'" 
                                class="px-3 py-1.5 text-xs rounded-full border transition-all duration-200 whitespace-nowrap"
                                x-text="cat">
                        </button>
                    </template>
                </div>

                <div class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
                    
                    <template x-if="loadingFeed">
                        <div class="space-y-4">
                            <template x-for="i in 3">
                                <div class="bg-zinc-900/40 border border-zinc-800/60 rounded-xl p-5 space-y-3 animate-pulse">
                                    <div class="h-3 w-24 bg-zinc-800 rounded"></div>
                                    <div class="h-5 w-3/4 bg-zinc-800 rounded"></div>
                                    <div class="h-4 w-5/6 bg-zinc-800 rounded"></div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template x-if="!loadingFeed && articles.length === 0">
                        <div class="h-full flex flex-col items-center justify-center text-zinc-500 py-12">
                            <span class="text-3xl mb-2">📥</span>
                            <p class="text-sm">No live data available in this catalog context.</p>
                        </div>
                    </template>

                    <template x-if="!loadingFeed">
                        <template x-for="article in articles" :key="article.link">
                            <div class="group bg-zinc-900/30 border border-zinc-800/80 hover:border-zinc-700/80 rounded-xl p-5 flex flex-col justify-between transition-all duration-200 hover:shadow-xl hover:shadow-indigo-500/[0.02]">
                                <div>
                                    <div class="flex items-center justify-between mb-2">
                                        <span class="text-[10px] uppercase tracking-widest font-bold text-indigo-400 bg-indigo-950/50 px-2 py-0.5 rounded border border-indigo-900/50" x-text="article.source"></span>
                                    </div>
                                    <h3 class="text-base font-bold text-zinc-100 group-hover:text-white transition-colors duration-150 line-clamp-2 mb-2" x-text="article.title"></h3>
                                    <p class="text-xs text-zinc-400 line-clamp-2 leading-relaxed" x-text="article.summary"></p>
                                </div>
                                <div class="mt-4 pt-4 border-t border-zinc-900/60 flex justify-end">
                                    <button @click="analyzeArticle(article)" 
                                            :disabled="loadingAnalysis"
                                            class="inline-flex items-center space-x-2 text-xs font-semibold bg-zinc-800 hover:bg-indigo-600 text-zinc-200 hover:text-white px-4 py-2 rounded-lg transition-all duration-150 active:scale-[0.98] disabled:opacity-50">
                                        <span>Analyze with AI</span>
                                        <span class="text-[10px]">⚡</span>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </template>
                </div>
            </section>

            <section class="w-2/5 bg-zinc-900/10 flex flex-col">
                <div class="p-4 border-b border-zinc-800 bg-zinc-900/30 shrink-0">
                    <h2 class="text-xs uppercase tracking-widest font-bold text-zinc-400 flex items-center space-x-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span>
                        <span>NLP Intelligence Core Engine</span>
                    </h2>
                </div>

                <div class="flex-1 overflow-y-auto p-6">
                    
                    <template x-if="!selectedArticle && !loadingAnalysis">
                        <div class="h-full flex flex-col items-center justify-center text-center text-zinc-500 px-6">
                            <div class="w-12 h-12 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center justify-center text-xl mb-4 text-zinc-400">📊</div>
                            <h4 class="text-sm font-semibold text-zinc-400 mb-1">Awaiting Data Ingestion</h4>
                            <p class="text-xs text-zinc-500 max-w-xs leading-relaxed">Select any news item card from the feed array to run natural language text extraction and summary pipelines.</p>
                        </div>
                    </template>

                    <template x-if="loadingAnalysis">
                        <div class="space-y-6 animate-pulse">
                            <div class="space-y-2">
                                <div class="h-4 w-1/3 bg-zinc-800 rounded"></div>
                                <div class="h-20 bg-zinc-900 rounded-xl"></div>
                            </div>
                            <div class="space-y-3">
                                <div class="h-4 w-1/4 bg-zinc-800 rounded"></div>
                                <div class="h-5 w-full bg-zinc-900 rounded"></div>
                                <div class="h-5 w-full bg-zinc-900 rounded"></div>
                                <div class="h-5 w-4/5 bg-zinc-900 rounded"></div>
                            </div>
                        </div>
                    </template>

                    <template x-if="!loadingAnalysis && selectedArticle">
                        <div class="space-y-6">
                            <div>
                                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-wider" x-text="selectedArticle.source"></span>
                                <h2 class="text-lg font-bold text-white mt-1 leading-snug" x-text="selectedArticle.title"></h2>
                            </div>

                            <div class="bg-indigo-950/20 border border-indigo-900/40 p-5 rounded-xl shadow-inner">
                                <h4 class="text-xs font-bold uppercase tracking-wider text-indigo-400 mb-2 flex items-center space-x-1.5">
                                    <span>⚡</span><span>Executive Quick Take</span>
                                </h4>
                                <p class="text-sm text-indigo-100/90 leading-relaxed font-medium" x-text="aiExplanation"></p>
                            </div>

                            <hr class="border-zinc-800/80" />

                            <div class="space-y-4">
                                <h4 class="text-xs font-bold uppercase tracking-wider text-purple-400 flex items-center space-x-1.5">
                                    <span>🌐</span><span>Deep Trend Analytics Context</span>
                                </h4>
                                <div class="text-sm text-zinc-300 leading-relaxed space-y-4 font-normal whitespace-pre-line" x-text="aiDeepContext"></div>
                            </div>
                        </div>
                    </template>

                </div>
            </section>
        </main>
    </div>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
